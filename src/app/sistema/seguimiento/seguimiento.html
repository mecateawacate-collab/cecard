<section class="min-h-[70vh] bg-[#F6F4FA] px-4 py-12 text-[#1E1B3A]">
  <div class="mx-auto max-w-xl rounded-2xl border border-[#E5DFF0] bg-white p-8 shadow-xl md:p-10">
    <div class="mb-8 text-center">
      <h1 class="text-3xl font-extrabold text-[#3B2E6D]">
        Acceso al expediente
      </h1>

      <p class="mt-3 text-sm leading-6 text-[#26324A]">
        Ingresa los datos solicitados para consultar la información del expediente.
      </p>
    </div>

    <form class="space-y-6">
      <div>
        <label
          for="numeroExpediente"
          class="mb-2 block text-sm font-bold text-[#1E1B3A]"
        >
          Número de expediente:
        </label>

        <input
          id="numeroExpediente"
          name="numeroExpediente"
          type="text"
          class="w-full rounded-lg border border-gray-300 bg-white px-4 py-3 text-[#1E1B3A] shadow-sm outline-none transition-all duration-300 focus:border-[#5E4CA9] focus:ring-4 focus:ring-[#5E4CA9]/10"
        />
      </div>

      <div>
        <label
          for="anio"
          class="mb-2 block text-sm font-bold text-[#1E1B3A]"
        >
          Año:
        </label>

        <input
          id="anio"
          name="anio"
          type="text"
          class="w-full rounded-lg border border-gray-300 bg-white px-4 py-3 text-[#1E1B3A] shadow-sm outline-none transition-all duration-300 focus:border-[#5E4CA9] focus:ring-4 focus:ring-[#5E4CA9]/10"
        />
      </div>

      <div>
        <label
          for="tipo"
          class="mb-2 block text-sm font-bold text-[#1E1B3A]"
        >
          Tipo:
        </label>

        <select
          id="tipo"
          name="tipo"
          class="w-full rounded-lg border border-gray-300 bg-white px-4 py-3 text-[#1E1B3A] shadow-sm outline-none transition-all duration-300 focus:border-[#5E4CA9] focus:ring-4 focus:ring-[#5E4CA9]/10"
        >
          <option value="">Selecciona una opción</option>
          <option value="laudo">Laudo Arbitral</option>
          <option value="jprd">Decisión JPRD</option>
          <option value="etica">Consejo de Ética</option>
        </select>
      </div>

      <div>
        <label
          for="password"
          class="mb-2 block text-sm font-bold text-[#1E1B3A]"
        >
          Contraseña:
        </label>

        <input
          id="password"
          name="password"
          type="password"
          class="w-full rounded-lg border border-gray-300 bg-white px-4 py-3 text-[#1E1B3A] shadow-sm outline-none transition-all duration-300 focus:border-[#5E4CA9] focus:ring-4 focus:ring-[#5E4CA9]/10"
        />
      </div>

      <button
        type="submit"
        class="mt-4 w-full rounded-lg bg-[#3B2E6D] px-6 py-3 font-bold text-white shadow-md transition-all duration-300 hover:-translate-y-1 hover:bg-[#A52A5A] hover:shadow-lg"
      >
        Ingresar
      </button>
    </form>
  </div>
</section>
